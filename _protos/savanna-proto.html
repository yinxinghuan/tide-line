<!DOCTYPE html><html><head><meta charset="utf-8"><style>html,body{margin:0;background:#0b1820}</style></head>
<body><canvas id="c" width="900" height="720"></canvas>
<script>
const ctx=document.getElementById('c').getContext('2d'),W=900,H=720,TAU=Math.PI*2;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function circle(x,y,r,f){ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.fillStyle=f;ctx.fill();}
function rough(cx,cy,rx,ry,o,rng,fill){const N=o.n||32,macro=o.macro??0.07,rot=o.rot||0;const p1=rng()*TAU,p2=rng()*TAU,k1=2+((rng()*2)|0),k2=3+((rng()*3)|0);ctx.beginPath();for(let i=0;i<N;i++){const a=i/N*TAU+rot;const m=1+macro*Math.sin(a*k1+p1)+macro*0.55*Math.sin(a*k2+p2);const rr=o.roughFn?o.roughFn(a):(o.rough??0.04);const r=m*(1+(rng()*2-1)*rr);const x=cx+Math.cos(a)*rx*r,y=cy+Math.sin(a)*ry*r;i?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.closePath();ctx.fillStyle=fill;ctx.fill();}
const dn=a=>Math.max(0,Math.sin(a)),up=a=>Math.max(0,-Math.sin(a));
function rlimb(x1,y1,x2,y2,w,rng,fill){const mx=(x1+x2)/2+(rng()*2-1)*w*1.1,my=(y1+y2)/2+(rng()*2-1)*w*1.1;const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy)||1,nx=-dy/len,ny=dx/len;ctx.beginPath();ctx.moveTo(x1+nx*w,y1+ny*w);ctx.quadraticCurveTo(mx+nx*w*0.85,my+ny*w*0.85,x2+nx*w*0.4,y2+ny*w*0.4);ctx.lineTo(x2-nx*w*0.4,y2-ny*w*0.4);ctx.quadraticCurveTo(mx-nx*w*0.85,my-ny*w*0.85,x1-nx*w,y1-ny*w);ctx.closePath();ctx.fillStyle=fill;ctx.fill();}
function eyeA(x,y,r){circle(x,y,r,'#1d2620');}
function eyeC(x,y,r,rng){circle(x,y,r,'#1d2620');const fr=r*0.4;ctx.save();ctx.translate(x-r*0.2,y-r*0.2);ctx.rotate(rng()*TAU);ctx.beginPath();ctx.moveTo(-fr,0);ctx.lineTo(fr*0.4,-fr*0.8);ctx.lineTo(fr,fr*0.3);ctx.closePath();ctx.fillStyle='rgba(255,255,255,.85)';ctx.fill();ctx.restore();}
function shadow(cx,cy,s){ctx.save();ctx.translate(cx,cy);ctx.scale(1,0.28);circle(0,s*0.7/0.28,s*0.85,'rgba(60,40,10,0.16)');ctx.restore();}

// ── SAVANNA scene ──
ctx.fillStyle='#9cc0d2';ctx.fillRect(0,0,W,H*0.5);          // sky
ctx.fillStyle='#f1d493';ctx.fillRect(0,H*0.3,W,H*0.2);      // golden haze
circle(W*0.72,H*0.34,84,'#ffd86a');                          // big low sun
// distant acacia treeline + hills
ctx.fillStyle='#caa765';ctx.beginPath();ctx.moveTo(0,H*0.52);ctx.quadraticCurveTo(W*0.3,H*0.46,W*0.6,H*0.5);ctx.quadraticCurveTo(W*0.85,H*0.53,W,H*0.49);ctx.lineTo(W,H*0.56);ctx.lineTo(0,H*0.56);ctx.closePath();ctx.fill();
function acacia(x,y,s){ctx.strokeStyle='#5a5634';ctx.lineWidth=s*0.12;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y-s*0.9);ctx.stroke();ctx.fillStyle='#5a5634';ctx.beginPath();ctx.ellipse(x,y-s*0.95,s*0.85,s*0.28,0,0,TAU);ctx.fill();ctx.beginPath();ctx.ellipse(x,y-s*1.15,s*0.5,s*0.2,0,0,TAU);ctx.fill();}
acacia(W*0.16,H*0.52,80);acacia(W*0.84,H*0.5,66);acacia(W*0.45,H*0.5,50);
// grassland ground
ctx.fillStyle='#d8b85a';ctx.fillRect(0,H*0.54,W,H*0.46);
ctx.fillStyle='#c4a346';ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(0,H*0.82);ctx.lineTo(W,H*0.86);ctx.lineTo(W,H);ctx.closePath();ctx.fill();
// grass tufts
function tuft(x,y,s,col){ctx.strokeStyle=col;ctx.lineWidth=s*0.18;ctx.lineCap='round';for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(x+i*s*0.12,y);ctx.quadraticCurveTo(x+i*s*0.18,y-s*0.7,x+i*s*0.3,y-s);ctx.stroke();}}
const tr=mulberry32(5);for(let i=0;i<14;i++){const x=tr()*W,y=H*0.6+tr()*H*0.38,s=14+tr()*16;tuft(x,y,s,tr()<0.5?'#b89a36':'#caa84a');}

// threat: poacher's snare (stake + wire noose)
function snare(x,y,s,seed){ctx.strokeStyle='#7a6a4a';ctx.lineWidth=s*0.12;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y-s*1.1);ctx.stroke();ctx.strokeStyle='#9a9a9a';ctx.lineWidth=s*0.06;ctx.beginPath();ctx.moveTo(x,y-s*1.1);ctx.quadraticCurveTo(x+s*0.6,y-s*0.9,x+s*0.5,y-s*0.4);ctx.stroke();ctx.beginPath();ctx.ellipse(x+s*0.5,y-s*0.18,s*0.42,s*0.24,0,0,TAU);ctx.stroke();}

// ── savanna animals (hand-drawn) ──
function elephant(cx,cy,s,seed){const r=mulberry32(seed);const g='#8d8a82',l='#9d9a92';shadow(cx,cy,s);ctx.save();ctx.translate(cx,cy);
  for(const dx of[-0.45,-0.15,0.2,0.5])rlimb(s*dx,s*0.3,s*dx,s*1.0,s*0.17,r,g);
  rough(0,0,s*0.82,s*0.66,{n:30,macro:0.07,roughFn:a=>0.015+0.045*dn(a)},r,g); // body
  rough(s*0.7,-s*0.35,s*0.46,s*0.46,{n:24,macro:0.09,rough:0.06},r,l); // head
  rough(s*0.5,-s*0.45,s*0.32,s*0.4,{n:18,macro:0.16,rough:0.1},r,g); // ear
  // trunk
  ctx.strokeStyle=l;ctx.lineWidth=s*0.2;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(s*0.92,-s*0.28);ctx.quadraticCurveTo(s*1.2,s*0.2,s*1.0,s*0.7);ctx.stroke();
  // tusk
  ctx.strokeStyle='#f0ead8';ctx.lineWidth=s*0.07;ctx.beginPath();ctx.moveTo(s*0.85,-s*0.05);ctx.quadraticCurveTo(s*1.0,s*0.2,s*0.95,s*0.35);ctx.stroke();
  eyeA(s*0.78,-s*0.38,s*0.06);ctx.restore();}
function giraffe(cx,cy,s,seed){const r=mulberry32(seed);const b='#e0b56a',sp='#b07a3a';shadow(cx,cy,s);ctx.save();ctx.translate(cx,cy);
  for(const dx of[-0.3,-0.05,0.25,0.45])rlimb(s*dx,s*0.2,s*dx*0.9,s*1.15,s*0.09,r,b);
  rough(0,0,s*0.52,s*0.4,{n:24,macro:0.08,rough:0.05},r,b); // body
  rlimb(s*0.3,-s*0.1,s*0.62,-s*1.15,s*0.16,r,b); // long neck
  rough(s*0.68,-s*1.32,s*0.22,s*0.26,{n:16,macro:0.12,rough:0.07},r,b); // head
  // ossicones
  ctx.strokeStyle=b;ctx.lineWidth=s*0.05;ctx.lineCap='round';for(const dx of[-0.05,0.08]){ctx.beginPath();ctx.moveTo(s*(0.66+dx),-s*1.45);ctx.lineTo(s*(0.66+dx),-s*1.6);ctx.stroke();circle(s*(0.66+dx),-s*1.62,s*0.05,b);}
  // spots
  for(let i=0;i<6;i++){const px=-0.2+r()*0.5,py=-1.1+r()*1.0;rough(s*px,s*py,s*0.09,s*0.09,{n:8,macro:0.2,rough:0.14},r,sp);}
  eyeA(s*0.74,-s*1.34,s*0.05);ctx.restore();}
function zebra(cx,cy,s,seed){const r=mulberry32(seed);const w='#eef0ee',k='#2a2a2a';shadow(cx,cy,s);ctx.save();ctx.translate(cx,cy);
  for(const dx of[-0.4,-0.1,0.25,0.5])rlimb(s*dx,s*0.2,s*dx,s*1.05,s*0.1,r,w);
  rough(0,0,s*0.64,s*0.46,{n:26,macro:0.08,roughFn:a=>0.015+0.045*dn(a)},r,w); // body
  rlimb(s*0.45,-s*0.05,s*0.7,-s*0.6,s*0.16,r,w); // neck
  rough(s*0.78,-s*0.72,s*0.24,s*0.3,{n:16,macro:0.1,rough:0.06},r,w); // head
  // stripes
  ctx.strokeStyle=k;ctx.lineWidth=s*0.06;for(let i=-3;i<=3;i++){ctx.beginPath();ctx.moveTo(s*i*0.13,-s*0.4);ctx.quadraticCurveTo(s*i*0.14,0,s*i*0.13,s*0.4);ctx.stroke();}
  // mane
  ctx.lineWidth=s*0.05;for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(s*(0.5+i*0.06),-s*0.2-i*0.06*s);ctx.lineTo(s*(0.56+i*0.06),-s*0.5-i*0.06*s);ctx.stroke();}
  ctx.fillStyle=k;ctx.beginPath();ctx.moveTo(s*0.72,-s*0.95);ctx.lineTo(s*0.66,-s*1.2);ctx.lineTo(s*0.8,-s*0.98);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(s*0.86,-s*0.95);ctx.lineTo(s*0.92,-s*1.2);ctx.lineTo(s*0.8,-s*0.98);ctx.closePath();ctx.fill();
  eyeA(s*0.84,-s*0.74,s*0.05);ctx.restore();}
function meerkat(cx,cy,s,seed){const r=mulberry32(seed);const b='#c2a070',d='#5a4632',l='#d8bd96';shadow(cx,cy,s);ctx.save();ctx.translate(cx,cy);
  rough(0,s*0.2,s*0.4,s*0.7,{n:24,macro:0.08,roughFn:a=>0.015+0.05*dn(a)},r,b); // upright body
  rough(0,s*0.25,s*0.24,s*0.4,{n:16,macro:0.1,rough:0.05},r,l); // belly
  rlimb(-s*0.15,s*0.1,-s*0.22,s*0.5,s*0.07,r,b);rlimb(s*0.15,s*0.1,s*0.22,s*0.5,s*0.07,r,b); // arms
  rough(0,-s*0.5,s*0.3,s*0.32,{n:18,macro:0.1,rough:0.06},r,b); // head
  // ears
  circle(-s*0.24,-s*0.66,s*0.1,b);circle(s*0.24,-s*0.66,s*0.1,b);
  // eye patches
  rough(-s*0.13,-s*0.52,s*0.1,s*0.08,{n:8,rough:0.1},r,d);rough(s*0.13,-s*0.52,s*0.1,s*0.08,{n:8,rough:0.1},r,d);
  circle(s*0,-s*0.36,s*0.06,d); // nose
  eyeA(-s*0.13,-s*0.52,s*0.05);eyeA(s*0.13,-s*0.52,s*0.05);ctx.restore();}

// place
snare(W*0.28,H*0.84,90,3);
giraffe(W*0.66,H*0.6,118,201);
elephant(W*0.42,H*0.78,150,7);
zebra(W*0.2,H*0.82,86,33);
meerkat(W*0.82,H*0.84,62,55);

// paper grain
const t=document.createElement('canvas');t.width=t.height=300;const tc=t.getContext('2d');const im=tc.createImageData(300,300);for(let i=0;i<im.data.length;i+=4){const n=128+(Math.random()*2-1)*24;im.data[i]=im.data[i+1]=im.data[i+2]=n;im.data[i+3]=255;}tc.putImageData(im,0,0);
ctx.save();ctx.globalCompositeOperation='overlay';ctx.globalAlpha=0.4;ctx.fillStyle=ctx.createPattern(t,'repeat');ctx.fillRect(0,0,W,H);ctx.restore();
ctx.fillStyle='rgba(60,40,10,.92)';ctx.font='800 40px Georgia,serif';ctx.fillText('WILD LINE',26,52);ctx.font='600 22px Helvetica';ctx.fillStyle='rgba(60,40,10,.7)';ctx.fillText('· SAVANNA',232,50);
</script></body></html>
